name: Generate Snake

on:
  schedule: # Kích hoạt mỗi ngày để cập nhật con rắn
    - cron: "0 0 * * *" # Chạy vào mỗi ngày lúc nửa đêm (UTC)
  workflow_dispatch: # Cho phép kích hoạt thủ công

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - uses: Platane/snk@master
        id: snake-gif
        with:
          github_user_name: BbySharp-dev # Thay thế bằng username GitHub của bạn
          svg_out_path: dist/github-snake.svg

      - uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
